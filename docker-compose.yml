services:
  futumore:
    build: .
    container_name: futumore
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production

    # ── Security hardening ──
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    pids_limit: 100

    # ── Resource limits ──
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

    networks:
      - futumore-network

networks:
  futumore-network:
    driver: bridge
