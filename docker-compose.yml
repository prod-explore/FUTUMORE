version: '3.9'

services:
  frontend:
    image: nginx:alpine
    container_name: futumore-nginx
    volumes:
      - ./frontend/html:/usr/share/nginx/html:ro
      - ./frontend/nginx/futumore.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - futumore-network

  backend:
    build: ./backend
    container_name: futumore-backend
    env_file:
      - ./backend/.env
    networks:
      - futumore-network

networks:
  futumore-network:
    external: true
